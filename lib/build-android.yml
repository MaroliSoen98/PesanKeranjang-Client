name: Build Android APK

on:
  push:
    branches:
      - main # Akan otomatis build setiap ada perubahan di branch 'main'
  workflow_dispatch: # Tombol ajaib untuk menjalankan build secara manual di GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # Menggunakan Java 17 yang direkomendasikan untuk Android masa kini

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Ambil package & dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK agar bisa didownload
        uses: actions/upload-artifact@v4
        with:
          name: PesanKeranjang-Client-APK
          path: build/app/outputs/flutter-apk/app-release.apk