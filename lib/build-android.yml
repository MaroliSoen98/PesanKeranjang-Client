name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Memicu pembuatan Release saat ada tag versi (contoh: v1.0.0)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Izin penting agar GitHub Action bisa membuat Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Ambil package & dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK ke Artifacts (Cadangan)
        uses: actions/upload-artifact@v4
        with:
          name: PesanKeranjang-Client-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Buat GitHub Release & Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Versi ${{ github.ref_name }}
          draft: false
          prerelease: false